<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Adam Shirwa</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Adam <span>Shirwa</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <main>
    <section>
      <p class="section-label">Contact</p>
      <h1 class="section-title" style="font-size:32px;">Get in touch</h1>

      <div class="contact-links">
        <a class="contact-link-card fade-in" href="mailto:ashirwa.mac@gmail.com">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-light)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <div>
            <div class="contact-label">Email</div>
            <div class="contact-value">ashirwa.mac@gmail.com</div>
          </div>
        </a>
        <a class="contact-link-card fade-in" href="https://github.com/ashirwa" target="_blank" rel="noopener">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-light)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          </div>
          <div>
            <div class="contact-label">GitHub</div>
            <div class="contact-value">github.com/ashirwa</div>
          </div>
        </a>
        <a class="contact-link-card fade-in" href="https://www.linkedin.com/in/adam-shirwa-85202731b/" target="_blank" rel="noopener">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-light)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </div>
          <div>
            <div class="contact-label">LinkedIn</div>
            <div class="contact-value">adam-shirwa</div>
          </div>
        </a>
      </div>

      <form id="contact-form" onsubmit="handleSubmit(event)" class="fade-in" style="margin-top:1.5rem;">
        <div class="form-group">
          <label for="cf-name">Name</label>
          <input type="text" id="cf-name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="cf-email">Email</label>
          <input type="email" id="cf-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="cf-msg">Message</label>
          <textarea id="cf-msg" placeholder="Say hello..." required></textarea>
        </div>
        <button type="submit" class="form-submit">Send message</button>
        <p class="success-msg" id="success-msg">Message sent — I'll get back to you soon.</p>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 Adam Shirwa</p>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('success-msg').style.display = 'block';
      e.target.reset();
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
